<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<script>
			// Resolve the motion preference before first paint so animations never flash.
			(() => {
				try {
					const stored = localStorage.getItem('aylith:motion');
					const pref = stored === 'reduced' || stored === 'full' ? stored : 'system';
					const systemReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
					const resolved = pref === 'system' ? (systemReduced ? 'reduced' : 'full') : pref;
					document.documentElement.dataset.motion = resolved;
				} catch (error) {
					/* no-op: CSS falls back to the prefers-reduced-motion media query */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
